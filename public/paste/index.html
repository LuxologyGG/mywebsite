<h3>Paste</h3>
<p class="paste-status-text" data-paste-status>Draft</p>
<textarea
  class="paste-textarea glassy"
  data-paste-content
  placeholder="Paste whatever text you want here..."
  spellcheck="false"
></textarea>
<div class="paste-actions">
  <button class="glassy" type="button" data-paste-save>Save Paste</button>
  <button class="glassy" type="button" data-paste-copy disabled>Copy Link</button>
</div>
